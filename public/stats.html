<!DOCTYPE html>
<html lang="zh-CN" data-title-i18n="statsPageTitle">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>当月工时统计 - Panshaker</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 15px;
        }

        .window {
            width: 500px;
            max-width: 95%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .window-body {
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th,
        td {
            border: 1px solid #999;
            padding: 5px;
            text-align: left;
        }

        th {
            background-color: #dfdfdf;
        }

        .toolbar {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .total-row {
            font-weight: bold;
            background-color: #ffffca;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-content .window-body {
            overflow: auto;
            max-height: 60vh;
        }

        #langToggle {
            position: fixed;
            bottom: calc(10px + env(safe-area-inset-bottom));
            right: 10px;
            z-index: 9999;
            padding: 2px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .toolbar {
                flex-wrap: wrap;
                justify-content: space-between;
            }

            table th,
            table td {
                padding: 2px;
                font-size: 12px;
            }

            .modal-content {
                width: 95%;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>

    <!-- Language Toggle -->
    <button id="langToggle" onclick="i18n.toggleLang()">EN</button>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text" data-i18n="statsWindowTitle">海外项目当月国内工时核算</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="window.location.href='index.html'"></button>
            </div>
        </div>
        <div class="window-body">

            <div class="toolbar">
                <label for="monthPicker" data-i18n="selectMonthLabel">选择月份:</label>
                <input type="month" id="monthPicker">
                <button onclick="loadStats()" data-i18n="queryBtn">查询</button>
                <button id="exportBtn" onclick="exportExcel()" data-i18n="exportBtn">导出 Excel</button>
                <button onclick="window.location.href='finance.html'" data-i18n="financeBtn">财务测算</button>
                <div style="flex-grow:1;"></div>
                <button onclick="logout()" data-i18n="logout">注销退出</button>
            </div>

            <div class="sunken-panel" style="height: 300px; padding: 0;">
                <table class="interactive">
                    <thead>
                        <tr>
                            <th data-i18n="thName">姓名</th>
                            <th data-i18n="thDept">部门</th>
                            <th data-i18n="thTotalHours">累计投入工时 (小时)</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody">
                        <tr>
                            <td colspan="3" style="text-align: center;" data-i18n="loading">加载中...</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td colspan="2" data-i18n="grandTotalLabel">总计:</td>
                            <td id="grandTotal">0.0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

        </div>
    </div>

    <!-- Modal for Employee Details -->
    <div id="detailsModal" class="modal">
        <div class="window modal-content">
            <div class="title-bar">
                <div class="title-bar-text" id="detailsTitle" data-i18n="employeeDetailTitle">员工详情</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeDetails()"></button>
                </div>
            </div>
            <div class="window-body">
                <div class="sunken-panel" style="padding: 0;">
                    <table class="interactive">
                        <thead>
                            <tr>
                                <th data-i18n="thDate">日期</th>
                                <th data-i18n="thTimeRange">时间段</th>
                                <th data-i18n="thTaskContent">工作内容</th>
                                <th data-i18n="thHours">计入工时</th>
                            </tr>
                        </thead>
                        <tbody id="detailsTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center;" data-i18n="loading">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Account Management Window -->
    <div class="window" style="width: 550px; max-width: 95%;">
        <div class="title-bar">
            <div class="title-bar-text" data-i18n="accountMgmtTitle">账户管理</div>
        </div>
        <div class="window-body">
            <div class="sunken-panel" style="height: 200px; overflow: auto; padding: 0;">
                <table class="interactive">
                    <thead>
                        <tr>
                            <th data-i18n="thAccount">账号</th>
                            <th data-i18n="thName">姓名</th>
                            <th data-i18n="thDept">部门</th>
                            <th data-i18n="thAccHours">累计工时</th>
                            <th data-i18n="thOps">操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center;" data-i18n="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for User Records -->
    <div id="userRecordsModal" class="modal">
        <div class="window modal-content">
            <div class="title-bar">
                <div class="title-bar-text" id="userRecordsTitle" data-i18n="userRecordsTitle">账户记录</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeUserRecords()"></button>
                </div>
            </div>
            <div class="window-body">
                <div class="toolbar" style="margin-bottom:8px;">
                    <label for="userMonthPicker" data-i18n="monthLabel">月份:</label>
                    <input type="month" id="userMonthPicker">
                    <button onclick="loadUserRecords()" data-i18n="queryBtn">查询</button>
                </div>
                <div class="sunken-panel" style="padding: 0; max-height: 300px; overflow: auto;">
                    <table class="interactive">
                        <thead>
                            <tr>
                                <th data-i18n="thDate">日期</th>
                                <th data-i18n="thTimeRange">时间段</th>
                                <th data-i18n="thTaskContent">工作内容</th>
                                <th data-i18n="thHours">计入工时</th>
                            </tr>
                        </thead>
                        <tbody id="userRecordsTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center;" data-i18n="selectMonthFirst">请选择月份查询</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Edit User -->
    <div id="editUserModal" class="modal">
        <div class="window modal-content" style="width: 380px;">
            <div class="title-bar">
                <div class="title-bar-text" id="editUserTitle" data-i18n="editUserTitle">编辑账户</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeEditUser()"></button>
                </div>
            </div>
            <div class="window-body">
                <div class="field-row" style="margin-bottom:8px;">
                    <label style="width:50px;text-align:right;margin-right:8px;" data-i18n="accountFieldLabel">账号:</label>
                    <input id="editAccount" type="text" readonly style="flex:1;background:#dfdfdf;" />
                </div>
                <div class="field-row" style="margin-bottom:8px;">
                    <label style="width:50px;text-align:right;margin-right:8px;" data-i18n="nameFieldLabel">姓名:</label>
                    <input id="editName" type="text" readonly style="flex:1;background:#dfdfdf;" />
                </div>
                <div class="field-row" style="margin-bottom:8px;">
                    <label style="width:50px;text-align:right;margin-right:8px;" data-i18n="passwordFieldLabel">密码:</label>
                    <input id="editPassword" type="text" style="flex:1;" />
                </div>
                <div style="text-align:right;margin-top:12px;">
                    <button onclick="saveUser()" style="width:80px;" data-i18n="saveBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script>
        // Auth check
        if (localStorage.getItem('ps_role') !== 'admin') {
            window.location.href = 'login.html';
        }

        // Apply language
        i18n.applyLang();

        const isMiniProgram = i18n.isMiniProgramContext();
        if (isMiniProgram) {
            const exportBtn = document.getElementById('exportBtn');
            exportBtn.title = i18n.t('exportDisabledInMiniProgram');

            document.getElementById('langToggle').addEventListener('click', () => {
                setTimeout(() => {
                    exportBtn.title = i18n.t('exportDisabledInMiniProgram');
                }, 0);
            });
        }

        function logout() {
            localStorage.removeItem('ps_role');
            window.location.href = 'login.html';
        }

        // HTML escape to prevent XSS
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Set default month to current month
        const today = new Date();
        const currentMonth = today.toISOString().slice(0, 7);
        document.getElementById('monthPicker').value = currentMonth;

        async function loadStats() {
            const month = document.getElementById('monthPicker').value;
            const tbody = document.getElementById('statsTableBody');
            const grandTotal = document.getElementById('grandTotal');

            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center;">${i18n.t('loading')}</td></tr>`;
            grandTotal.innerText = '0.0';

            try {
                const res = await fetch(`/api/stats?month=${month}`);
                if (!res.ok) throw new Error(i18n.t('networkError'));
                const data = await res.json();

                tbody.innerHTML = '';
                let total = 0;

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align: center;">${i18n.t('noData')}</td></tr>`;
                    return;
                }

                data.forEach(stat => {
                    total += stat.totalHours;
                    const tr = document.createElement('tr');
                    const safeName = esc(stat.employeeName);
                    tr.innerHTML = `
                    <td><a href="#" onclick="showDetails('${safeName}')">${safeName}</a></td>
                    <td>${esc(stat.department)}</td>
                    <td>${stat.totalHours.toFixed(2)}</td>
                `;
                    tbody.appendChild(tr);
                });

                grandTotal.innerText = total.toFixed(2);

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">${i18n.t('loadFailed')}: ${err.message}</td></tr>`;
            }
        }

        async function showDetails(employeeName) {
            const month = document.getElementById('monthPicker').value;
            const modal = document.getElementById('detailsModal');
            const title = document.getElementById('detailsTitle');
            const tbody = document.getElementById('detailsTableBody');

            title.innerText = `${employeeName} - ${month}`;
            // Remove data-i18n so applyLang won't override dynamic title
            title.removeAttribute('data-i18n');
            modal.style.display = 'flex';
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">${i18n.t('loading')}</td></tr>`;

            try {
                const res = await fetch(`/api/records/employee/${encodeURIComponent(employeeName)}?month=${month}`);
                if (!res.ok) throw new Error(i18n.t('networkError'));
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">${i18n.t('noDetail')}</td></tr>`;
                    return;
                }

                data.forEach(rec => {
                    const startStr = new Date(rec.StartTime).toLocaleString('zh-CN', { hour12: false });
                    const endStr = new Date(rec.EndTime).toLocaleString('zh-CN', { hour12: false });
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${startStr.slice(0, 10)}</td>
                        <td>${startStr.slice(11, 16)} - ${endStr.slice(11, 16)}</td>
                        <td>${rec.TaskDescription}</td>
                        <td>${rec.DurationHours.toFixed(2)}h</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">${i18n.t('loadFailed')}: ${err.message}</td></tr>`;
            }
        }

        function exportExcel() {
            if (isMiniProgram) {
                alert(i18n.t('exportDisabledInMiniProgram'));
                return;
            }

            const month = document.getElementById('monthPicker').value;
            if (!month) {
                alert(i18n.t('selectMonthAlert'));
                return;
            }
            window.location.href = `/api/export?month=${month}`;
        }

        function closeDetails() {
            document.getElementById('detailsModal').style.display = 'none';
            // Restore data-i18n for the title
            document.getElementById('detailsTitle').setAttribute('data-i18n', 'employeeDetailTitle');
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('detailsModal');
            const userModal = document.getElementById('userRecordsModal');
            const editModal = document.getElementById('editUserModal');
            if (event.target == modal) {
                closeDetails();
            }
            if (event.target == userModal) {
                closeUserRecords();
            }
            if (event.target == editModal) {
                closeEditUser();
            }
        }

        // ── Account Management ──
        let currentViewUser = '';

        async function loadUsers() {
            const tbody = document.getElementById('usersTableBody');
            try {
                const res = await fetch('/api/users');
                if (!res.ok) throw new Error(i18n.t('networkError'));
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">${i18n.t('noUsers')}</td></tr>`;
                    return;
                }

                data.forEach(user => {
                    const tr = document.createElement('tr');
                    const safeName = esc(user.Name);
                    const safeAccount = esc(user.Account);
                    tr.innerHTML = `
                        <td>${safeAccount}</td>
                        <td>${safeName}</td>
                        <td>${esc(user.Department)}</td>
                        <td>${user.TotalHours.toFixed(2)}h</td>
                        <td>
                            <button onclick="viewUser('${safeName}')">${i18n.t('viewBtn')}</button>
                            <button onclick="editUser('${safeAccount}')">${i18n.t('editBtn')}</button>
                            <button onclick="deleteUser('${safeAccount}', '${safeName}')">${i18n.t('deleteUserBtn')}</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">${i18n.t('loadFailed')}</td></tr>`;
            }
        }

        function viewUser(name) {
            currentViewUser = name;
            const modal = document.getElementById('userRecordsModal');
            const title = document.getElementById('userRecordsTitle');
            title.innerText = `${name}`;
            title.removeAttribute('data-i18n');
            document.getElementById('userMonthPicker').value = currentMonth;
            modal.style.display = 'flex';
            loadUserRecords();
        }

        async function loadUserRecords() {
            const month = document.getElementById('userMonthPicker').value;
            const tbody = document.getElementById('userRecordsTableBody');
            if (!currentViewUser || !month) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">${i18n.t('selectMonthPrompt')}</td></tr>`;
                return;
            }

            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">${i18n.t('loading')}</td></tr>`;

            try {
                const res = await fetch(`/api/records/employee/${encodeURIComponent(currentViewUser)}?month=${month}`);
                if (!res.ok) throw new Error(i18n.t('networkError'));
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align: center;">${i18n.t('noMonthRecords')}</td></tr>`;
                    return;
                }

                data.forEach(rec => {
                    const startStr = new Date(rec.StartTime).toLocaleString('zh-CN', { hour12: false });
                    const endStr = new Date(rec.EndTime).toLocaleString('zh-CN', { hour12: false });
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${startStr.slice(0, 10)}</td>
                        <td>${startStr.slice(11, 16)} - ${endStr.slice(11, 16)}</td>
                        <td>${rec.TaskDescription}</td>
                        <td>${rec.DurationHours.toFixed(2)}h</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">${i18n.t('loadFailed')}</td></tr>`;
            }
        }

        function closeUserRecords() {
            document.getElementById('userRecordsModal').style.display = 'none';
            document.getElementById('userRecordsTitle').setAttribute('data-i18n', 'userRecordsTitle');
            currentViewUser = '';
        }

        let currentEditAccount = '';

        async function editUser(account) {
            try {
                const res = await fetch(`/api/users/${encodeURIComponent(account)}`);
                if (!res.ok) throw new Error(i18n.t('loadFailed'));
                const user = await res.json();

                document.getElementById('editAccount').value = user.Account;
                document.getElementById('editName').value = user.Name;
                document.getElementById('editPassword').value = user.Password;
                currentEditAccount = user.Account;
                document.getElementById('editUserModal').style.display = 'flex';
            } catch (err) {
                alert(i18n.t('loadFailed'));
            }
        }

        async function saveUser() {
            const password = document.getElementById('editPassword').value;
            if (!password) {
                alert(i18n.t('fillAllFields'));
                return;
            }
            try {
                const res = await fetch(`/api/users/${encodeURIComponent(currentEditAccount)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (res.ok) {
                    alert(i18n.t('saveSuccess'));
                    closeEditUser();
                    loadUsers();
                } else {
                    const data = await res.json();
                    alert(i18n.tErr(data.error) || i18n.t('saveFailed'));
                }
            } catch (e) {
                alert(i18n.t('networkError'));
            }
        }

        function closeEditUser() {
            document.getElementById('editUserModal').style.display = 'none';
            currentEditAccount = '';
        }

        async function deleteUser(account, name) {
            const msg = i18n.getLang() === 'en'
                ? `Delete account ${name}(${account})?\n\nThis will also delete all work records.`
                : `确定删除账户 ${name}(${account})？\n\n点击"确定"将同时删除该用户的所有工时记录。`;
            if (!confirm(msg)) return;

            try {
                const res = await fetch(`/api/users/${encodeURIComponent(account)}?deleteRecords=true`, { method: 'DELETE' });
                if (res.ok) {
                    alert(i18n.t('userDeleted'));
                    loadUsers();
                    loadStats();
                } else {
                    const data = await res.json();
                    alert(i18n.tErr(data.error) || i18n.t('deleteFailed'));
                }
            } catch (e) {
                alert(i18n.t('networkError'));
            }
        }

        // Load initially
        loadStats();
        loadUsers();
    </script>

</body>

</html>

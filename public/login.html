<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - Panshaker</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .window {
            width: 300px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .field-row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .field-row label {
            width: 60px;
            text-align: right;
            margin-right: 10px;
        }

        .field-row input {
            flex: 1;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">系统身份验证</div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <p style="text-align: center; margin-bottom: 20px;">欢迎使用 Panshaker 工时系统</p>
            <form id="loginForm">
                <div class="field-row">
                    <label for="password">密码:</label>
                    <input id="password" type="password" required autofocus />
                </div>
                <div class="button-group">
                    <button type="submit" style="font-weight: bold; width: 80px;">登录</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pwd = document.getElementById('password').value;

            if (pwd === '8888') {
                localStorage.setItem('ps_role', 'employee');
                window.location.href = 'index.html';
            } else if (pwd === '9999') {
                localStorage.setItem('ps_role', 'boss');
                window.location.href = 'stats.html';
            } else {
                alert('密码错误，请重试！\n提示：员工 8888，老板 9999');
                document.getElementById('password').value = '';
            }
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - Panshaker</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 15px;
        }

        .window {
            width: 340px;
            max-width: 90%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .field-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .field-row label {
            width: 60px;
            text-align: right;
            margin-right: 10px;
        }

        .field-row input,
        .field-row select {
            flex: 1;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
            gap: 10px;
        }

        .link-btn {
            background: none;
            border: none;
            color: blue;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .window {
                width: 95% !important;
            }

            .field-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .field-row label {
                width: auto;
                text-align: left;
            }

            .field-row input,
            .field-row select {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

    <!-- Login Window -->
    <div class="window" id="loginWindow">
        <div class="title-bar">
            <div class="title-bar-text">系统登录</div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <p style="text-align: center; margin-bottom: 15px;">欢迎使用 Panshaker 工时系统</p>
            <form id="loginForm">
                <div class="field-row">
                    <label for="loginAccount">账号:</label>
                    <input id="loginAccount" type="text" placeholder="输入数字账号" required autofocus />
                </div>
                <div class="field-row">
                    <label for="loginPassword">密码:</label>
                    <input id="loginPassword" type="password" placeholder="输入密码" required />
                </div>
                <div id="loginMsg" style="display:none; text-align:center; font-size:13px; color:red;"></div>
                <div class="button-group">
                    <button type="button" class="link-btn" onclick="showRegister()">注册新账号</button>
                    <div style="flex-grow:1;"></div>
                    <button type="submit" style="font-weight: bold; width: 80px;">登录</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Register Window (hidden by default) -->
    <div class="window" id="registerWindow" style="display: none;">
        <div class="title-bar">
            <div class="title-bar-text">注册新账号</div>
            <div class="title-bar-controls">
                <button aria-label="Close" onclick="showLogin()"></button>
            </div>
        </div>
        <div class="window-body">
            <form id="registerForm">
                <div class="field-row">
                    <label for="regName">姓名:</label>
                    <input id="regName" type="text" placeholder="真实姓名" required />
                </div>
                <div class="field-row">
                    <label for="regDept">部门:</label>
                    <select id="regDept" required>
                        <option value="">请选择...</option>
                        <option value="研发中心">研发中心</option>
                        <option value="市场部">市场部</option>
                        <option value="设计部">设计部</option>
                        <option value="运营部">运营部</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="field-row">
                    <label for="regAccount">账号:</label>
                    <input id="regAccount" type="text" placeholder="设置一个数字账号" required />
                </div>
                <div class="field-row">
                    <label for="regPassword">密码:</label>
                    <input id="regPassword" type="password" placeholder="设置登录密码" required />
                </div>
                <div id="regMsg" style="display:none; text-align:center; font-size:13px;"></div>
                <div class="button-group">
                    <button type="button" class="link-btn" onclick="showLogin()">返回登录</button>
                    <div style="flex-grow:1;"></div>
                    <button type="submit" style="font-weight: bold; width: 80px;">注册</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('loginWindow').style.display = 'none';
            document.getElementById('registerWindow').style.display = '';
            document.getElementById('regName').focus();
        }

        function showLogin() {
            document.getElementById('registerWindow').style.display = 'none';
            document.getElementById('loginWindow').style.display = '';
            document.getElementById('loginAccount').focus();
        }

        function showMsg(id, text, color) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.style.color = color || 'red';
            el.style.display = 'block';
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 404) {
                        showMsg('loginMsg', '账号未注册，请先注册');
                    } else {
                        showMsg('loginMsg', data.error || '登录失败');
                    }
                    return;
                }

                if (data.role === 'admin') {
                    localStorage.setItem('ps_role', 'admin');
                    window.location.href = 'stats.html';
                } else {
                    localStorage.setItem('ps_role', 'employee');
                    localStorage.setItem('ps_name', data.name);
                    localStorage.setItem('ps_department', data.department);
                    window.location.href = 'index.html';
                }
            } catch (err) {
                showMsg('loginMsg', '网络错误');
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const department = document.getElementById('regDept').value;
            const account = document.getElementById('regAccount').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!name || !department || !account || !password) {
                showMsg('regMsg', '请填写所有字段');
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, name, department, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showMsg('regMsg', data.error || '注册失败');
                    return;
                }

                showMsg('regMsg', '注册成功！正在跳转登录...', 'green');
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginAccount').value = account;
                }, 1000);
            } catch (err) {
                showMsg('regMsg', '网络错误');
            }
        });
    </script>

</body>

</html>

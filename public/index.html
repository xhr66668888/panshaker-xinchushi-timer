<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panshaker 工作记录系统</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 15px;
        }

        .window {
            width: 450px;
            max-width: 95%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .field-row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .field-row label {
            width: 100px;
            text-align: right;
            margin-right: 10px;
        }

        .field-row input[type="text"],
        .field-row input[type="datetime-local"],
        .field-row select {
            flex: 1;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            gap: 10px;
        }

        #messageBox {
            display: none;
            margin-top: 15px;
            color: green;
            text-align: center;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .window {
                width: 95% !important;
            }

            .field-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .field-row label {
                width: auto;
                text-align: left;
            }

            .field-row input[type="text"],
            .field-row input[type="date"],
            .field-row input[type="time"],
            .field-row select {
                width: 100%;
                box-sizing: border-box;
            }

            /* Make datetime fields take full width together if needed, or stack */
            .field-row input[style] {
                margin-left: 0 !important;
                margin-top: 5px;
            }

            table th,
            table td {
                padding: 2px;
                font-size: 12px;
            }

            .button-group {
                flex-wrap: wrap;
                justify-content: space-between;
            }

            .button-group button {
                flex: 1;
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">海外工时记录系统</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <fieldset>
                <legend>基本信息</legend>
                <form id="recordForm">
                    <div class="field-row">
                        <label for="employeeName">姓名:</label>
                        <input id="employeeName" type="text" required />
                    </div>
                    <div class="field-row">
                        <label for="department">部门:</label>
                        <select id="department" required>
                            <option value="">请选择...</option>
                            <option value="研发中心">研发中心</option>
                            <option value="市场部">市场部</option>
                            <option value="设计部">设计部</option>
                            <option value="运营部">运营部</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <label for="taskDescription">Panshaker 工作内容:</label>
                        <input id="taskDescription" type="text" placeholder="例如: 开发海外官网后台" required />
                    </div>
                </form>
            </fieldset>

            <fieldset style="margin-top: 15px;">
                <legend>工作时间</legend>
                <div class="field-row">
                    <label>开始时间:</label>
                    <input id="startDate" type="date" required form="recordForm" />
                    <input id="startTime" type="time" required form="recordForm" style="margin-left: 5px;" />
                </div>
                <div class="field-row">
                    <label>结束时间:</label>
                    <input id="endDate" type="date" required form="recordForm" />
                    <input id="endTime" type="time" required form="recordForm" style="margin-left: 5px;" />
                </div>
            </fieldset>

            <div id="messageBox"></div>

            <div class="button-group">
                <button type="button" onclick="logout()">注销退出</button>
                <div style="flex-grow: 1;"></div>
                <button type="reset" form="recordForm">重置</button>
                <button type="submit" form="recordForm" style="font-weight: bold;">提交记录</button>
            </div>
        </div>
    </div>

    <div class="window" style="width: 550px; max-width: 95%;">
        <div class="title-bar">
            <div class="title-bar-text">提交记录</div>
        </div>
        <div class="window-body">
            <div class="sunken-panel" style="height: 150px; overflow: auto; padding: 0;">
                <table class="interactive">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>项目/内容</th>
                            <th>耗时</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recentTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Auth check
        if (localStorage.getItem('ps_role') !== 'employee' || !localStorage.getItem('ps_name')) {
            // If no name stored, force re-login to get user info
            localStorage.removeItem('ps_role');
            localStorage.removeItem('ps_name');
            localStorage.removeItem('ps_department');
            window.location.href = 'login.html';
        }

        // Auto-fill name and department from login info
        const savedName = localStorage.getItem('ps_name');
        const savedDept = localStorage.getItem('ps_department');
        if (savedName) {
            document.getElementById('employeeName').value = savedName;
            document.getElementById('employeeName').readOnly = true;
        }
        if (savedDept) {
            const deptSelect = document.getElementById('department');
            deptSelect.value = savedDept;
            deptSelect.disabled = true;
            // Create a hidden input so the value still submits with form
            const hiddenDept = document.createElement('input');
            hiddenDept.type = 'hidden';
            hiddenDept.name = 'department';
            hiddenDept.id = 'departmentHidden';
            hiddenDept.value = savedDept;
            deptSelect.parentNode.appendChild(hiddenDept);
        }

        function logout() {
            localStorage.removeItem('ps_role');
            localStorage.removeItem('ps_name');
            localStorage.removeItem('ps_department');
            window.location.href = 'login.html';
        }

        // Set default times to today
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        const isoStrEnd = now.toISOString();

        document.getElementById('endDate').value = isoStrEnd.slice(0, 10);
        document.getElementById('startDate').value = isoStrEnd.slice(0, 10);
        document.getElementById('endTime').value = isoStrEnd.slice(11, 16);

        now.setHours(now.getHours() - 1);
        const isoStrStart = now.toISOString();
        document.getElementById('startTime').value = isoStrStart.slice(11, 16);

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const startTime = new Date(`${document.getElementById('startDate').value}T${document.getElementById('startTime').value}`);
            const endTime = new Date(`${document.getElementById('endDate').value}T${document.getElementById('endTime').value}`);

            if (endTime <= startTime) {
                alert('错误: 结束时间必须晚于开始时间！');
                return;
            }

            const data = {
                EmployeeName: document.getElementById('employeeName').value,
                Department: document.getElementById('departmentHidden')
                    ? document.getElementById('departmentHidden').value
                    : document.getElementById('department').value,
                TaskDescription: document.getElementById('taskDescription').value,
                StartTime: startTime.toISOString(),
                EndTime: endTime.toISOString()
            };

            const msgBox = document.getElementById('messageBox');

            try {
                const response = await fetch('/api/records', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    msgBox.style.color = 'green';
                    msgBox.innerText = '提交成功！';
                    msgBox.style.display = 'block';
                    setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
                    document.getElementById('taskDescription').value = '';
                    loadRecentRecords();
                } else {
                    throw new Error(await response.text());
                }
            } catch (err) {
                msgBox.style.color = 'red';
                msgBox.innerText = '提交失败: ' + err.message;
                msgBox.style.display = 'block';
            }
        });

        async function loadRecentRecords() {
            const tbody = document.getElementById('recentTableBody');
            try {
                const res = await fetch('/api/records/recent');
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">暂无近期提交记录</td></tr>';
                    return;
                }

                data.forEach((rec, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${rec.TaskDescription}</td>
                        <td>${rec.DurationHours.toFixed(2)}h</td>
                        <td><button onclick="deleteRecord(${rec.Id})">撤销(删除)</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red;">加载失败</td></tr>`;
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确定删除该记录？')) return;

            try {
                const res = await fetch(`/api/records/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('记录已撤销！');
                    loadRecentRecords();
                } else {
                    alert('删除失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        // Initial load
        loadRecentRecords();
    </script>

</body>

</html>
